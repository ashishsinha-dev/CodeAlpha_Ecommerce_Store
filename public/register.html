<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account — Voltage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site">
    <div class="container bar">
      <a class="logo" href="/">Volt<span>age</span><span class="dot">.</span></a>
      <nav class="nav"></nav>
    </div>
  </header>

  <main class="container">
    <div class="auth-wrap">
      <div class="panel">
        <h2 class="page" style="margin-top:0">Create your account</h2>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" type="text" placeholder="Aanya Sharma" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="At least 6 characters" />
        </div>
        <button class="btn block" id="submit">Create account</button>
        <p id="msg" style="color:var(--danger); margin:14px 0 0; font-weight:500"></p>
        <p class="center muted" style="margin-top:18px">Already have an account? <a href="/login.html">Log in</a></p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    async function submit() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (password.length < 6) { document.getElementById('msg').textContent = 'Password must be at least 6 characters.'; return; }
      try {
        await api('/api/auth/register', { method: 'POST', body: { name, email, password } });
        location.href = '/';
      } catch (e) { document.getElementById('msg').textContent = e.message; }
    }
    document.getElementById('submit').onclick = submit;
    renderHeader();
  </script>
</body>
</html>
